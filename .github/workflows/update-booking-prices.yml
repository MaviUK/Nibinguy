name: Source cleanup

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  source-cleanup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update source files
        run: |
          python - <<'PY'
          from pathlib import Path

          landing = Path('src/LandingPage.jsx')
          text = landing.read_text()
          text = text.replace('{ id: "domestic_oneoff", label: "One-off", price: 12.5 }', '{ id: "domestic_oneoff", label: "One-off", price: 15 }')
          text = text.replace('{ id: "comm_lt360_oneoff", label: "Commercial <360L One-Off", price: 12.5 }', '{ id: "comm_lt360_oneoff", label: "Commercial <360L One-Off", price: 15 }')
          text = text.replace('{ id: "comm_gt660_oneoff", label: "Commercial >660L One-Off", price: 30 }', '{ id: "comm_gt660_oneoff", label: "Commercial >660L One-Off", price: 35 }')
          landing.write_text(text)

          index = Path('index.html')
          html = index.read_text()
          html = html.replace(
              'box-shadow: 0 10px 24px rgba(34,197,94,0.22); cursor: pointer; font: inherit;">Book a Clean</button>',
              'box-shadow: 0 10px 24px rgba(34,197,94,0.22); cursor: pointer; font-family: Arial, Helvetica, sans-serif; font-size: 1rem; line-height: 1.2;">Book a Clean</button>'
          )
          index.write_text(html)
          PY

      - name: Commit source cleanup
        run: |
          if git diff --quiet; then
            echo "Source files already clean"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/LandingPage.jsx index.html
          git commit -m "Clean source values and button style"
          git push
