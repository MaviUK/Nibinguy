name: Fresh20 Expiry Update

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extend Fresh20 expiry
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('src/LandingPage.jsx')
          s = p.read_text(encoding='utf-8')
          old = 'expiresAt: "2026-02-28T23:59:59Z", // expiry (UTC)'
          new = 'expiresAt: "2026-07-31T23:59:59Z", // expiry (UTC)'
          if old not in s and new not in s:
              raise SystemExit('Fresh20 expiry line not found')
          p.write_text(s.replace(old, new, 1), encoding='utf-8')
          PY
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Extend FRESH20 voucher to July 2026
          file_pattern: src/LandingPage.jsx
