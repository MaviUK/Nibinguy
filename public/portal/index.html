<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Portal | Ni Bin Guy</title>
  <meta name="robots" content="noindex, follow" />
  <script src="https://widgets.sqg.ee/main.js" defer></script>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #000;
      color: #fff;
    }

    body {
      overflow-x: hidden;
    }

    main {
      min-height: 100svh;
      width: 100%;
      padding: 16px;
    }

    .wrap {
      width: 100%;
      max-width: 960px;
      margin: 0 auto;
      text-align: center;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 16px;
      color: #4ade80;
      font-weight: 700;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    h1 {
      margin: 0 0 10px;
      color: #4ade80;
      font-size: clamp(1.75rem, 7vw, 3rem);
      line-height: 1.1;
    }

    p {
      max-width: 680px;
      margin: 0 auto 18px;
      color: #d4d4d8;
      line-height: 1.5;
    }

    .portal-shell {
      width: 100%;
      max-width: 900px;
      min-height: 760px;
      margin: 0 auto;
      overflow: visible;
    }

    .portal-shell [data-sqc="layout"] {
      width: 100%;
      min-height: 760px;
    }

    @media (max-width: 640px) {
      main {
        padding: 10px 0 24px;
      }

      .back-link,
      h1,
      p {
        display: none;
      }

      .wrap {
        max-width: none;
      }

      .portal-shell {
        width: 100vw;
        max-width: none;
        min-height: calc(100svh - 20px);
        margin: 0;
        padding: 0;
      }

      .portal-shell [data-sqc="layout"] {
        width: 100%;
        min-height: calc(100svh - 20px);
      }
    }
  </style>
</head>
<body>
  <main id="main-content" tabindex="-1">
    <div class="wrap">
      <a class="back-link" href="/">Back to homepage</a>
      <h1>Customer Portal</h1>
      <p>Manage your Ni Bin Guy account, payments and service details in the secure customer portal.</p>
      <div class="portal-shell">
        <div
          data-sqc="layout"
          data-sqa="25a031e7-75af-4a0e-9f3a-d308fd9b2e3a"
          data-sqe="https://sqgee.com"
        ></div>
      </div>
    </div>
  </main>
</body>
</html>
