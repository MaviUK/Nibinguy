<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Portal | Ni Bin Guy</title>
  <meta name="robots" content="noindex, follow" />
  <script src="https://widgets.sqg.ee/main.js" defer></script>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #000;
      color: #fff;
    }

    body {
      overflow-x: hidden;
    }

    main {
      min-height: 100svh;
      width: 100%;
      padding: 44px 22px 40px;
    }

    .wrap {
      width: 100%;
      max-width: 960px;
      margin: 0 auto;
      text-align: center;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 46px;
      color: #4ade80;
      font-weight: 700;
      font-size: 1.45rem;
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    h1 {
      margin: 0 0 26px;
      color: #4ade80;
      font-size: clamp(2.65rem, 7.5vw, 3.45rem);
      line-height: 1.1;
      font-weight: 900;
    }

    p {
      max-width: 680px;
      margin: 0 auto 66px;
      color: #e4e4e7;
      font-size: clamp(1.35rem, 4.1vw, 1.75rem);
      line-height: 1.55;
    }

    .portal-shell {
      width: 100%;
      max-width: 900px;
      min-height: 760px;
      margin: 0 auto;
      display: block;
      background: #18181b;
      border: 1px solid rgba(255,255,255,0.35);
      border-radius: 1.5rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      overflow: visible;
      padding: 0;
    }

    .portal-shell [data-sqc="layout"] {
      width: 100%;
      min-height: 760px;
    }

    @media (max-width: 640px) {
      main {
        padding: 44px 22px 32px;
      }

      .back-link {
        margin-bottom: 48px;
        font-size: 1.55rem;
      }

      h1 {
        margin-bottom: 26px;
        font-size: clamp(2.7rem, 9.2vw, 3.4rem);
      }

      p {
        margin-bottom: 68px;
        font-size: 1.6rem;
        line-height: 1.55;
      }

      .portal-shell {
        width: 100%;
        max-width: none;
        min-height: 760px;
        border-radius: 1.5rem;
      }

      .portal-shell [data-sqc="layout"] {
        width: 100%;
        min-height: 760px;
      }
    }
  </style>
</head>
<body>
  <main id="main-content" tabindex="-1">
    <div class="wrap">
      <a class="back-link" href="/">Back to homepage</a>
      <h1>Customer Portal</h1>
      <p>Manage your Ni Bin Guy account, payments and service details in the secure customer portal.</p>
      <div class="portal-shell">
        <div
          data-sqc="layout"
          data-sqa="25a031e7-75af-4a0e-9f3a-d308fd9b2e3a"
          data-sqe="https://sqgee.com"
        ></div>
      </div>
    </div>
  </main>
</body>
</html>
