<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Portal | Ni Bin Guy</title>
  <meta name="robots" content="noindex, follow" />
  <script src="https://widgets.sqg.ee/main.js" defer></script>
  <style>
    :root {
      color-scheme: dark;
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      color: #fff;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #000;
      color: #fff;
    }

    main {
      min-height: 100vh;
      padding: 40px 16px;
      box-sizing: border-box;
    }

    .wrap {
      width: 100%;
      max-width: 960px;
      margin: 0 auto;
      text-align: center;
    }

    a {
      color: #4ade80;
    }

    h1 {
      margin: 24px 0 12px;
      color: #4ade80;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1.1;
    }

    p {
      max-width: 680px;
      margin: 0 auto 28px;
      color: #d4d4d8;
      line-height: 1.6;
    }

    .portal-card {
      width: 100%;
      max-width: 800px;
      min-height: 700px;
      margin: 0 auto;
      display: block;
      background: #18181b;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 1rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      overflow: visible;
      padding: 20px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <main id="main-content" tabindex="-1">
    <div class="wrap">
      <a href="/">Back to homepage</a>
      <h1>Customer Portal</h1>
      <p>Manage your Ni Bin Guy account, payments and service details in the secure customer portal.</p>
      <div
        class="portal-card"
        data-sqc="layout"
        data-sqa="25a031e7-75af-4a0e-9f3a-d308fd9b2e3a"
        data-sqe="https://sqgee.com"
      ></div>
    </div>
  </main>
</body>
</html>
